type: object
required:
  - category
  - results
additionalProperties: false
properties:
  category:
    type: string
  results:
    type: array
    items:
      type: object
      required:
        - subcategory
        - score
        - evidence_used
        - rationale
        - failure_note
        - confidence
      additionalProperties: false
      properties:
        subcategory:
          type: string
        score:
          type: integer
          enum: [0, 1]
        evidence_used:
          type: array
          items:
            type: string
        rationale:
          type: string
        failure_note:
          anyOf:
            - type: string
            - type: "null"
        confidence:
          type: number
          minimum: 0
          maximum: 1
