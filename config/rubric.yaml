version: 1

aggregation:
  deterministic_hard_fail_wins: true
  deterministic_fail_overrides_llm: true
  deterministic_only_uses_validator_result: true
  required_failure_sets_overall_zero: true
  default_missing_confidence: 0.25

note_writing:
  max_words: 28
  required_when_score_is_zero: true
  instructions:
    - Explain why the audited final agent message failed.
    - Reference only facts present in the JSON input.
    - Do not cite policies unless the policy appears in this rubric/config.
    - Avoid generic notes such as "did not meet expectations".

categories:
  issue_identification:
    display_name: Issue Identification
    subcategories:
      intent_identified:
        method: hybrid
        best_approach: hybrid leaning llm
        required_for_overall: true
        deterministic_precedence: soft
        evidence_requirements: [messages, latest_customer_turn, audited_message]
      necessary_reply:
        method: hybrid
        best_approach: hybrid leaning llm with workflow gates
        required_for_overall: true
        deterministic_precedence: hard_fail
        evidence_requirements: [messages, workflow_flags, latest_customer_turn, audited_message]

  proper_resolution:
